<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <!-- ИСПРАВЛЕНО: Правильная библиотека для работы внутри ТГ -->
    <script src="https://telegram.org"></script>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .shield-logo {
            width: 80px; height: 80px;
            border: 3px solid #38bdf8;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 20px;
            box-shadow: 0 0 15px #38bdf8;
            margin: 20px 0;
        }
        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .btn-proxy {
            background: #f59e0b;
            color: #0f172a;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            width: 100%;
            margin-top: 15px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .status-dot {
            height: 10px; width: 10px;
            background-color: #22c55e;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="shield-logo">RDS</div>
    <div class="card">
        <h2 id="user-greeting">Защитник RDS</h2>
        <p style="color: #94a3b8;">Статус: <span class="status-dot"></span> Система активна</p>
        <hr style="border: 0.5px solid #334155; margin: 20px 0;">
        
        <p style="font-size: 14px;">Если Telegram работает медленно, используй наш резервный мост:</p>
        <button onclick="setupProxy()" class="btn-proxy">⚡ УСКОРИТЬ TELEGRAM</button>
    </div>

    <script>
    // Инициализация Mini App
    let tg = window.Telegram.WebApp;
    tg.expand();

    // Приветствие пользователя
    const user = tg.initDataUnsafe.user;
    if (user) {
        document.getElementById('user-greeting').innerText = `Привет, ${user.first_name}!`;
    }

    // ИСПРАВЛЕНО: Функция теперь открывает реальный прокси-диплинк
    function setupProxy() {
        // Используем протокол tg:// вместо https://
        const proxyUrl = "tg://proxy?server=exp.proxy.digitalshield.io&port=443&secret=ee00000000000000000000000000000000676f6f676c652e636f6d";
        
        // Попробуем два метода для надежности:
        try {
            tg.openTelegramLink(proxyUrl);
        } catch (e) {
            window.location.href = proxyUrl;
        }
    }

    }
    </script>
</body>
</html>
